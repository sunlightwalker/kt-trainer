let currentQuestions = [];
let currentIndex = 0;
        
function startLevel(lvl) {
            currentQuestions = grammarLevels[lvl];
            if (!currentQuestions) {
                alert("Ошибка: уровень " + lvl + " не найден!");
                return;
            }
            currentIndex = 0;
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            showQuestion();
        }

        function showQuestion() {
            const q = currentQuestions[currentIndex];
            document.getElementById('question-text').innerText = (currentIndex + 1) + ". " + q.q;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            q.a.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.innerText = opt;
                btn.onclick = () => {
                    const allBtns = container.querySelectorAll('.btn');
                    allBtns.forEach(b => b.disabled = true);
                    if (idx === q.correct) {
                        btn.classList.add('correct');
                    } else {
                        btn.classList.add('wrong');
                        allBtns[q.correct].classList.add('correct');
                    }
                    setTimeout(() => {
                        currentIndex++;
                        if (currentIndex < currentQuestions.length) showQuestion();
                        else { alert("Уровень завершен!"); backToMenu(); }
                    }, 1500);
                };
                container.appendChild(btn);
            });
        }

        function backToMenu() {
            document.getElementById('game-area').style.display = 'none';
            document.getElementById('menu').style.display = 'block';
            currentIndex = 0;
        }
        
        function showCurrentHint() {
    const q = currentQuestions[currentIndex];

    if (q && q.hint) {
        alert("💡 Подсказка: " + q.hint);
    } else {
        alert("К этому вопросу подсказка не предусмотрена.");
    }
}
