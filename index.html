            text6: {

            content: `For centuries, the pyramids of Giza have been timeless symbols of Egyptian culture. But who actually built them? For years, we did not know for sure. But archeologists recently discovered an ancient village near the pyramids. Close by, there was a cemetery where pyramid builders were buried. From studying these places, archeologists can now confirm that the pyramids were not built by slaves or foreigners (or space aliens!). Ordinary Egyptians built them. It took about eighty years to build the pyramids. According to archeologists, about 20,000-30,000 people were involved in completing the task. The workers had different roles. Some dug up the rock, some moved it, and some shaped it into blocks. People also worked in different teams, each with its own name. These teams often competed to do a job faster.

            text9: {
            title: "The London Underground",
            content: `The London Underground is the world's oldest and largest and covers most of London. Its 55% of the network is above ground. It has 275 stations and 12 interconnecting lines. Each line has a name and a colour to represent it on the underground map, for example the Victoria line is blue. The London Underground is the longest in the world, with over 408 km of track. Three million passengers travel every day. Londoners call the Underground the Tube (tube-shaped tunnels) The first trains started in 1863 on the Central line. During the Blitz, the aerial bombing of London in World War II, Londoners used to hide from the bombs by using the underground stations during air raids and sleeping on platforms. Air raid sirens were a signal for Londoners of approaching planes. The Underground doesn’t run 24 hours. Track maintenance is done at night, after the system closes. The first trains start after 5 a.m., until 1 a.m. Rush hour is from 7.30 a.m. to 9.30 a.m. and from 4.30 p.m. to 6.30 p.m. London has six travel zones. Zone one is the most central and zone six is the outer which includes Heathrow Airport. The more zones you cross the more you pay. To travel you can buy a daily ticket, a daily travel card or an Oyster card. This is a smart card with an electronic chip that you can charge with credit, and use to pay for the Underground and buses. It is the cheapest way of travelling in central London. Most underground stations have escalators and stairs. The longest escalator in Europe is at Angel station on the Northern line. It is 60m in length, with a vertical rise of 27.5m. People using the escalators stand on the right-hand side, those in a hurry walk on the left. There are several safety announcements, when the doors of the trains are about to close you hear 'stand clear of the doors please'. When the train stops in a station where there is a gap between the train and the platform you can hear, 'Mind the Gap!'`,

let currentQuestions = [];
let currentIndex = 0;
        
function startLevel(lvl) {
            currentQuestions = grammarLevels[lvl];
            if (!currentQuestions) {
                alert("Ошибка: уровень " + lvl + " не найден!");
                return;
            }
            currentIndex = 0;
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            showQuestion();
        }

        function showQuestion() {
            const q = currentQuestions[currentIndex];
            document.getElementById('question-text').innerText = (currentIndex + 1) + ". " + q.q;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            q.a.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.innerText = opt;
                btn.onclick = () => {
                    const allBtns = container.querySelectorAll('.btn');
                    allBtns.forEach(b => b.disabled = true);
                    if (idx === q.correct) {
                        btn.classList.add('correct');
                    } else {
                        btn.classList.add('wrong');
                        allBtns[q.correct].classList.add('correct');
                    }
                    setTimeout(() => {
                        currentIndex++;
                        if (currentIndex < currentQuestions.length) showQuestion();
                        else { alert("Уровень завершен!"); backToMenu(); }
                    }, 1500);
                };
                container.appendChild(btn);
            });
        }

        function backToMenu() {
            document.getElementById('game-area').style.display = 'none';
            document.getElementById('menu').style.display = 'block';
            currentIndex = 0;
        }
        
        function showCurrentHint() {
    const q = currentQuestions[currentIndex];
    // Проверяем, есть ли у текущего вопроса поле hint
    if (q && q.hint) {
        alert("💡 Подсказка: " + q.hint);
    } else {
        alert("К этому вопросу подсказка не предусмотрена.");
    }
}
        let activeTextKey = null;

    // Функция открытия текста перед вопросами
    function startText(textKey) {
        activeTextKey = textKey;
        const textObj = texts[textKey];
        
        document.getElementById('text-title').innerText = textObj.title;
        document.getElementById('text-content').innerText = textObj.content;
        
        document.getElementById('menu').style.display = 'none';
        document.getElementById('text-area').style.display = 'block';
    }

    // Функция перехода от чтения текста к вопросам
    function proceedToTextQuestions() {
        currentQuestions = texts[activeTextKey].questions;
        currentIndex = 0;
        
        document.getElementById('text-area').style.display = 'none';
        document.getElementById('game-area').style.display = 'block';
        showQuestion();
    }

    function openReadingModal() {
        if (!activeTextKey || !texts[activeTextKey]) {
            alert("Это обычный тест, здесь нет текста.");
            return;
        }
        const textObj = texts[activeTextKey];
        document.getElementById('modal-title').innerText = textObj.title;
        document.getElementById('modal-content').innerText = textObj.content;
        document.getElementById('reading-modal').style.display = 'flex';
    }

    function closeReadingModal() {
        document.getElementById('reading-modal').style.display = 'none';
    }
