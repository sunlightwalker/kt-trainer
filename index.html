<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>KT English Trainer</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
        .btn { display: block; width: 100%; margin: 10px 0; padding: 12px; cursor: pointer; border: 1px solid #ddd; border-radius: 8px; background: #fff; }
        .correct { background-color: #d4edda !important; border-color: #28a745 !important; }
        .wrong { background-color: #f8d7da !important; border-color: #dc3545 !important; }
        #game-area { display: none; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>Выберите уровень:</h1>
        <button class="btn" onclick="startLevel('level1')">Уровень 1: Пассивный залог</button>
        <button class="btn" onclick="startLevel('level2')">Уровень 2: Conditionals</button>
        <button class="btn" onclick="startLevel('level3')">Уровень 3: Косвенная речь</button>
        <button class="btn" onclick="startLevel('level4')">Уровень 4: Modal Verbs</button>
        <button class="btn" onclick="startLevel('level5')">Уровень 5: Mixed Traps</button>
    </div>

    <div id="game-area">
        <h3 id="question-text"></h3>
        <div id="options-container"></div>
        <button class="btn" onclick="backToMenu()" style="margin-top:20px;">Назад в меню</button>
    </div>

    { q: "The room ___ right now.", a: ["is being cleaned", "is cleaned", "was being cleaned"], correct: 0 },

    { q: "At 8 a.m. yesterday, the dishes ___.", a: ["were being washed", "were washed", "are being washed"], correct: 0 },
    { q: "Shh! The secret ___ discussed.", a: ["is being", "is", "was being"], correct: 0 },
    { q: "The room ___ already ___.", a: ["has been cleaned", "had been cleaned", "is cleaned"], correct: 0 },
    { q: "By the time I arrived, the cake ___ ___.", a: ["had been eaten", "has been eaten", "was eaten"], correct: 0 },
    { q: "The letter ___ just ___.", a: ["has been sent", "had been sent", "was sent"], correct: 0 },
    { q: "The job ___ finished by last Monday.", a: ["had been", "has been", "was"], correct: 0 },
    { q: "My phone ___ ___ stolen!", a: ["has been", "had been", "is being"], correct: 0 },
    { q: "The task ___ ___ done today.", a: ["must be", "must being", "must have been"], correct: 0 },
    { q: "The keys ___ ___ found in the drawer.", a: ["can be", "can being", "could be"], correct: 0 },
    { q: "You ___ ___ informed about the changes.", a: ["should be", "should being", "were"], correct: 0 },
    { q: "The room ___ ___ entered without permission.", a: ["may not be", "may not being", "must not be"], correct: 0 },
    { q: "The problem ___ ___ solved easily.", a: ["could be", "could being", "can be"], correct: 0 },
    { q: "Flowers ___ in the garden every morning.", a: ["are watered", "were watered", "are being watered"], correct: 0 },
    { q: "English ___ in many countries.", a: ["is spoken", "was spoken", "is being spoken"], correct: 0 },
    { q: "The new bridge ___ next year.", a: ["will be built", "is built", "was built"], correct: 0 },

    { q: "By 10 AM, we ___ ___ arrived at the site.", a: ["had already", "have already", "already"], correct: 0 },
    { q: "They ___ ___ this movie yet.", a: ["haven't seen", "didn't see", "don't see"], correct: 0 },
    { q: "He ___ never ___ to Astana.", a: ["has", "was", "is"], correct: 0 }
        ],
            level2: [

    { q: "If we ___ not hurry, we would be late.", a: ["don't", "didn't", "wouldn't"], correct: 1 },
    { q: "If you mix yellow and blue, you ___ green.", a: ["get", "will get", "got"], correct: 0 },
    { q: "If she ___ stronger, she would lift the beam.", a: ["is", "were", "will be"], correct: 1 },
    { q: "If the concrete ___ too fast, it will crack.", a: ["dries", "dried", "will dry"], correct: 0 },
    { q: "If we ___ more workers, we would finish the wall today.", a: ["have", "had", "will have"], correct: 1 },
    { q: "If the crane ___ down, we would be in trouble.", a: ["breaks", "broke", "will break"], correct: 1 },
    { q: "If you ___ the safety rules, you will stay safe.", a: ["follow", "followed", "will follow"], correct: 0 },
    { q: "If the architect ___ the design, the cost would increase.", a: ["changes", "changed", "will change"], correct: 1 },
    { q: "If the temperature ___ drop, the water will freeze.", a: ["drops", "dropped", "will drop"], correct: 0 },
    { q: "If I ___ you, I would check the blueprints twice.", a: ["am", "were", "will be"], correct: 1 },
    { q: "If the supervisor ___ call, tell him we are on site.", a: ["calls", "called", "will call"], correct: 0 },
    { q: "If they ___ better material, the building would last longer.", a: ["use", "used", "will use"], correct: 1 },
    { q: "If we ___ start now, we will arrive by noon.", a: ["start", "started", "will start"], correct: 0 },
    { q: "What would you do if the lift ___ stuck?", a: ["get", "got", "will get"], correct: 1 },
    { q: "If he ___ us a lift, we wouldn't have had to take a taxi.", a: ["has given", "had given", "would give"], correct: 1 },
    { q: "If he ___ a chance of success, he would need to move.", a: ["is to have", "were to have", "has"], correct: 1 },
    { q: "Unless you ___ hurry, you will be late.", a: ["don't", "will", "do"], correct: 2 },
    { q: "If it ___ sunny, we would go for a walk.", a: ["is", "were", "will be"], correct: 1 },
    { q: "If I ___ you, I wouldn't do that.", a: ["was", "were", "am"], correct: 1 },
    { q: "If they ___ us, we would have finished earlier.", a: ["helped", "had helped", "help"], correct: 1 },
    { q: "If you ___ water, it boils.", a: ["heat", "heated", "will heat"], correct: 0 },
    { q: "If I ___ known, I would have told you.", a: ["have", "had", "would"], correct: 1 },
    { q: "If he ___ busy, he wouldn't come.", a: ["is", "were", "will be"], correct: 1 }
],
            level3: [
    { q: "He said: 'I am working now.' → He said that he was working ___.", a: ["now", "then", "at that moment"], correct: 1 },

    { q: "The boss said: 'I need you today.' → The boss said that he needed me ___.", a: ["today", "that day", "the next day"], correct: 1 },
    { q: "He said: 'I did it this morning.' → He said that he had done it ___.", a: ["this morning", "that morning", "the morning before"], correct: 1 },
    { q: "She said: 'I am going to Paris next week.' → She said she was going to Paris ___.", a: ["next week", "the following week", "the previous week"], correct: 1 },
    { q: "He said: 'I met him two days ago.' → He said that he had met him ___.", a: ["two days ago", "two days before", "in two days"], correct: 1 },
    { q: "She said: 'I saw him here yesterday.' → She said that she had seen him ___.", a: ["here yesterday", "there the day before", "there yesterday"], correct: 1 },
    { q: "He said: 'I will be busy this week.' → He said he would be busy ___.", a: ["this week", "that week", "the next week"], correct: 1 },
    { q: "He said: 'I study engineering.' → He said that he ___ engineering.", a: ["study", "studied", "will study"], correct: 1 },
    { q: "She said: 'I am building a house.' → She said that she ___ a house.", a: ["is building", "was building", "built"], correct: 1 },
    { q: "They said: 'We have finished the project.' → They said that they ___ the project.", a: ["have finished", "finish", "had finished"], correct: 2 },
    { q: "He said: 'I will call the supervisor.' → He said that he ___ the supervisor.", a: ["will call", "would call", "called"], correct: 1 },
    { q: "She said: 'I can fix the problem.' → She said that she ___ the problem.", a: ["can fix", "could fix", "fixed"], correct: 1 },
    { q: "The manager said: 'The concrete is dry.' → He said that the concrete ___ dry.", a: ["is", "was", "has been"], correct: 1 },
    { q: "He said: 'I bought new materials.' → He said that he ___ new materials.", a: ["bought", "had bought", "buys"], correct: 1 },
    { q: "She said: 'I have been working all day.' → She said she ___ all day.", a: ["has been working", "had been working", "worked"], correct: 1 },
    { q: "He said: 'I don't like this site.' → He said that he ___ that site.", a: ["didn't like", "doesn't like", "hasn't liked"], correct: 0 },
    { q: "The architect said: 'The design is ready.' → The architect said the design ___ ready.", a: ["is", "was", "has been"], correct: 1 },
    { q: "Last week Justin said 'I'll do it tomorrow'. He said he would do it ___.", a: ["the next day", "tomorrow", "yesterday"], correct: 0 },
    { q: "He was asked if he ___ any foreign languages.", a: ["knows", "knew", "has known"], correct: 1 },
    { q: "She said: 'I have never been to Astana.' → She said she ___ never been there.", a: ["has", "had", "was"], correct: 1 },
    { q: "He said: 'I can't come.' → He said that he ___ come.", a: ["can't", "couldn't", "wouldn't"], correct: 1 },
    { q: "They said: 'We are ready.' → They said that they ___ ready.", a: ["are", "were", "had been"], correct: 1 },
    { q: "She said: 'I must leave.' → She said that she ___ to leave.", a: ["must", "had", "has"], correct: 1 },
    { q: "He said: 'I was busy.' → He said that he ___ busy.", a: ["was", "had been", "is"], correct: 1 },
    { q: "They said: 'We didn't see him.' → They said they ___ him.", a: ["didn't see", "hadn't seen", "haven't seen"], correct: 1 },
    { q: "She said: 'I will help you.' → She said she ___ me.", a: ["will help", "would help", "helped"], correct: 1 },

        };

        let currentQuestions = [];
        let currentIndex = 0;

        function startLevel(lvl) {
            currentQuestions = data[lvl];
            currentIndex = 0;
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            showQuestion();
        }

        function showQuestion() {
            const q = currentQuestions[currentIndex];
            document.getElementById('question-text').innerText = (currentIndex + 1) + ". " + q.q;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            q.a.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.innerText = opt;
                btn.onclick = () => {
                    const allBtns = container.querySelectorAll('.btn');
                    allBtns.forEach(b => b.disabled = true);
                    if (idx === q.correct) {
                        btn.classList.add('correct');
                    } else {
                        btn.classList.add('wrong');
                        allBtns[q.correct].classList.add('correct');
                    }
                    setTimeout(() => {
                        currentIndex++;
                        if (currentIndex < currentQuestions.length) showQuestion();
                        else alert("Уровень завершен!");
                    }, 1000);
                };
                container.appendChild(btn);
            });
        }

        function backToMenu() {
            document.getElementById('game-area').style.display = 'none';
            document.getElementById('menu').style.display = 'block';
        }
    </script>
</body>
</html>
