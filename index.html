    { q: "I stopped ___ some milk.", a: ["buying", "to buy", "buy"], correct: 1, hint: "Stop + to V (остановиться, чтобы сделать что-то), stop + V-ing (прекратить делать что-то)." },
    { q: "He made me ___ it again.", a: ["to do", "do", "doing"], correct: 1, hint: "Глаголы make и let требуют после себя инфинитив БЕЗ частицы 'to'." },
    { q: "___ sun is very bright today.", a: ["A", "An", "The"], correct: 2, hint: "Солнце единственное в своем роде, поэтому всегда используем 'The'." },
    { q: "He is ___ tallest boy in the class.", a: ["a", "an", "the"], correct: 2, hint: "Превосходная степень прилагательных (tallest) всегда требует артикль 'the'." },
    { q: "I have been waiting ___ two hours.", a: ["for", "since", "during"], correct: 0, hint: "For используется с периодом времени (длительность), since — с точкой отсчета." },
    { q: "He hasn't called ___ last week.", a: ["for", "since", "during"], correct: 1, hint: "Since используется для указания точного момента начала действия." },
    { q: "She is used ___ early.", a: ["to wake up", "to waking up", "waking up"], correct: 1, hint: "Be used to (привыкнуть к чему-то) требует -ing формы." },
    { q: "He reminded me ___ the door.", a: ["locking", "to lock", "lock"], correct: 1, hint: "Remind (напоминать) + somebody + to + V." },
    { q: "I prefer coffee ___ tea.", a: ["to", "than", "over"], correct: 0, hint: "В сравнении с глаголом prefer используем предлог 'to', а не 'than'." },
    { q: "This is ___ most interesting book.", a: ["a", "an", "the"], correct: 2, hint: "Превосходная степень (most interesting) требует артикль 'the'." },
    { q: "She insisted ___ paying.", a: ["in", "on", "at"], correct: 1, hint: "Insist on — настаивать на чем-то." },
    { q: "He is interested ___ history.", a: ["in", "on", "at"], correct: 0, hint: "Interested in — интересоваться чем-то." },
    { q: "___ information is very useful.", a: ["A", "An", "-"], correct: 2, hint: "Information — неисчисляемое существительное, артикль не нужен." },
    { q: "He is ___ expert in this field.", a: ["a", "an", "the"], correct: 1, hint: "Перед словом, начинающимся с гласного звука (expert), используем 'an'." },
    { q: "I'd rather ___ at home.", a: ["stay", "to stay", "staying"], correct: 0, hint: "После 'would rather' инфинитив ставится БЕЗ 'to'." },
    { q: "Hardly ___ had we started when it rained.", a: ["had we", "we had", "did we"], correct: 0, hint: "При инверсии с 'hardly' вспомогательный глагол ставится перед подлежащим." },
    { q: "Seldom ___ he go out.", a: ["does", "is", "has"], correct: 0, hint: "При инверсии с отрицательными наречиями (seldom, never) используем 'does/do/did'." },
    { q: "She apologized ___ being late.", a: ["for", "at", "to"], correct: 0, hint: "Apologize for — извиняться за что-то." },
    { q: "He congratulated me ___ passing the exam.", a: ["on", "with", "at"], correct: 0, hint: "Congratulate on — поздравлять с чем-то." },
    { q: "I am tired ___ waiting.", a: ["of", "in", "from"], correct: 0, hint: "Tired of — устать от чего-то." },
    { q: "The news ___ very good.", a: ["is", "are", "were"], correct: 0, hint: "News — всегда единственное число (даже если есть 's')." },
    { q: "Neither he nor I ___ ready.", a: ["am", "is", "are"], correct: 0, hint: "При использовании neither...nor глагол согласуется с последним подлежащим (I am)." }
]
};
        
let currentQuestions = [];
let currentIndex = 0;
        
function startLevel(lvl) {
            currentQuestions = grammarLevels[lvl];
            if (!currentQuestions) {
                alert("Ошибка: уровень " + lvl + " не найден!");
                return;
            }
            currentIndex = 0;
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            showQuestion();
        }

        function showQuestion() {
            const q = currentQuestions[currentIndex];
            document.getElementById('question-text').innerText = (currentIndex + 1) + ". " + q.q;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            q.a.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.innerText = opt;
                btn.onclick = () => {
                    const allBtns = container.querySelectorAll('.btn');
                    allBtns.forEach(b => b.disabled = true);
                    if (idx === q.correct) {
                        btn.classList.add('correct');
                    } else {
                        btn.classList.add('wrong');
                        allBtns[q.correct].classList.add('correct');
                    }
                    setTimeout(() => {
                        currentIndex++;
                        if (currentIndex < currentQuestions.length) showQuestion();
                        else { alert("Уровень завершен!"); backToMenu(); }
                    }, 1500);
                };
                container.appendChild(btn);
            });
        }

        function backToMenu() {
            document.getElementById('game-area').style.display = 'none';
            document.getElementById('menu').style.display = 'block';
            currentIndex = 0;
        }
        
        function showCurrentHint() {
    const q = currentQuestions[currentIndex];
    // Проверяем, есть ли у текущего вопроса поле hint
    if (q && q.hint) {
        alert("💡 Подсказка: " + q.hint);
    } else {
        alert("К этому вопросу подсказка не предусмотрена.");
    }
}
    </script>
